<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartKenya - Offline</title>
  <meta name="description" content="SmartKenya is currently offline. Check your internet connection and try again.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #f9fafb; color: #111827; }

    /* Container */
    .offline-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100%;
      padding: 20px;
    }

    /* Heading */
    h1 {
      font-size: 2.5rem;
      margin: 1rem 0;
      color: #16a34a;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #374151;
    }

    /* Retry Button */
    .retry-button {
      background-color: #16a34a;
      color: white;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      animation: pulse 2s infinite;
    }

    .retry-button:hover {
      background-color: #15803d;
      transform: scale(1.05);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Offline Icon */
    .offline-icon {
      width: 120px;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Confetti */
    .confetti {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti div {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #16a34a;
      opacity: 0.7;
      animation: drop 3s linear infinite;
    }

    @keyframes drop {
      0% { transform: translateY(-20px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Confetti -->
  <div class="confetti">
    <div style="left:5%; animation-delay:0s;"></div>
    <div style="left:15%; animation-delay:0.5s;"></div>
    <div style="left:25%; animation-delay:1s;"></div>
    <div style="left:35%; animation-delay:1.5s;"></div>
    <div style="left:45%; animation-delay:0.2s;"></div>
    <div style="left:55%; animation-delay:1.2s;"></div>
    <div style="left:65%; animation-delay:0.8s;"></div>
    <div style="left:75%; animation-delay:0.4s;"></div>
    <div style="left:85%; animation-delay:1.8s;"></div>
    <div style="left:95%; animation-delay:0.1s;"></div>
    <div style="left:10%; animation-delay:1.1s;"></div>
    <div style="left:20%; animation-delay:0.3s;"></div>
    <div style="left:30%; animation-delay:1.6s;"></div>
    <div style="left:40%; animation-delay:0.7s;"></div>
    <div style="left:50%; animation-delay:1.4s;"></div>
    <div style="left:60%; animation-delay:0.9s;"></div>
    <div style="left:70%; animation-delay:1.9s;"></div>
    <div style="left:80%; animation-delay:0.2s;"></div>
    <div style="left:90%; animation-delay:1.3s;"></div>
    <div style="left:100%; animation-delay:0.6s;"></div>
  </div>

  <div class="offline-container">
    <!-- Wi-Fi/Cloud SVG Icon -->
    <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" fill="#16a34a" viewBox="0 0 64 64">
      <path d="M32 12a16 16 0 0 0-16 16H10a22 22 0 0 1 44 0h-6a16 16 0 0 0-16-16z"/>
      <circle cx="32" cy="44" r="8"/>
    </svg>

    <h1>You’re Offline</h1>
    <p>SmartKenya is currently offline. Your page will reload automatically once your connection returns.</p>
    <a href="/" class="retry-button">Retry Now</a>
  </div>

  <script>
    // Auto-reload when back online
    function checkOnline() {
      if (navigator.onLine) {
        location.reload();
      }
    }

    // Listen for connection coming back
    window.addEventListener('online', () => {
      location.reload();
    });

    // Optional: retry every 5 seconds
    setInterval(checkOnline, 5000);
  </script>
</body>
</html>
