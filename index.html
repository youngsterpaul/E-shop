    </noscript>
    
    <!-- Critical CSS for above-the-fold content to reduce CLS -->
    <style>
      /* Prevent layout shift with explicit sizing */
      :root {
        --header-height: 64px;
        --mobile-nav-height: 60px;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Reserve space for hero section to prevent CLS */
      .hero-placeholder {
        min-height: 280px;
        background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      }
      @media (min-width: 768px) {
        .hero-placeholder {
          min-height: 480px;
        }
      }
      /* Skeleton loading animation */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton-loading {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      /* Image aspect ratio containers to prevent CLS */
      .aspect-square { aspect-ratio: 1 / 1; }
      .aspect-video { aspect-ratio: 16 / 9; }
      .aspect-hero { aspect-ratio: 4 / 1; }
      .aspect-hero-mobile { aspect-ratio: 2.68 / 1; }
    </style>
    
    <!-- Accessibility -->
    <meta name="color-scheme" content="light dark" />

    <!-- Business/Location Markup -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Kenya" />
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4788969103185262"
     crossorigin="anonymous"></script>
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "SmartKenya",
      "description": "Electronics and tech accessories online store in Kenya",
      "url": "https://www.smartkenya.co.ke",
      "logo": "https://www.smartkenya.co.ke/apple-touch-icon.png",
      "sameAs": [
        "https://twitter.com/SmartKenyaKE",
        "https://facebook.com/SmartKenyaKE"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE",
        "addressRegion": "Nairobi"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Swahili"]
      }
    }
    </script>
    
    <!-- Preload Critical Resources with High Priority -->
    <link rel="modulepreload" href="/src/main.tsx" />
    
    <!-- Defer Service Worker Registration to Improve Initial Load -->
    <script>
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller === null) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
              .then(registration => {
                console.log('SW registered');
              })
              .catch(() => {
                console.log('SW registration failed');
              });
          }, 2000);
        });
      }
    </script>
